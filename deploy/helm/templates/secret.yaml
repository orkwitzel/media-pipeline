# ─────────────────────────────────────────────────────────────────────────────
# media-pipeline — consolidated Secret (the SENSITIVE values only)
#
#  ⚠️  THE VALUES BELOW ARE DEV-ONLY PLACEHOLDERS (they match docker-compose).
#      Replace them before using a real cluster, and do NOT commit real secrets.
#      Generate strong values with, e.g.:   openssl rand -base64 24
#      For real environments, prefer one of:
#        - kubectl create secret generic media-pipeline-secrets --from-literal=... (don't store in git)
#        - Sealed Secrets / SOPS / External Secrets Operator (encrypted-at-rest in git)
#
#  `stringData` lets you write plain text; Kubernetes base64-encodes it for you.
#  (If you ever see a Secret with a `data:` block, those values are base64.)
#
#  Backing services run IN-CLUSTER. Each connection string assumes the backing
#  Service is named  postgres / rabbitmq / redis / minio  in THIS namespace —
#  that name is the DNS host the apps dial. Name your Services accordingly.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: media-pipeline
type: Opaque
stringData:
  user: minioadmin      # also used by the apps as S3_ACCESS_KEY
  password: minioadmin  # DEV ONLY — also used as S3_SECRET_KEY


--- # rabbitmq secret
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
  namespace: media-pipeline
type: Opaque
stringData:
  username: app
  password: app
  url: amqp://app:app@rabbitmq:5672/

--- # database secret
apiVersion: v1
kind: Secret
metadata:
  name: database-secrets
  namespace: media-pipeline
type: Opaque
stringData:
  username: app
  password: app
  db: app
  url: postgres://app:app@postgres:5432/app?sslmode=disable