# A: web (/) + notifier (/ws) — owns the host's TLS, NO rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-pipeline-web
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # long-lived /ws
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer }}
    {{- end }}
spec:
  ingressClassName: nginx
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: ["{{ .Values.ingress.origin }}"]
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.origin }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend: { service: { name: notifier, port: { number: 8082 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 8080 } } }
---
# B: gateway (/api) — WITH prefix strip
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-pipeline-api
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.origin }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: gateway, port: { number: 8080 } } }
{{- if .Values.ingress.tls.enabled }}
---
# cert-manager self-signed issuer — cluster-scoped, NO namespace
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.ingress.tls.issuer }}
spec:
  selfSigned: {}
{{- end }}
