# prod values
# Namespace is managed by Helm itself: install with
#   helm install media-pipeline ./deploy/helm -n media-pipeline --create-namespace
# Templates reference {{ .Release.Namespace }}, so the chart is namespace-agnostic.

web:
  replicas: 3

gateway:
  replicas: 3

worker:
  replicas: 3

notifier:
  replicas: 3

migrator:
  replicas: 1

ingress:
  origin: media-pipeline.example.com
  tls:
    enabled: false
    issuer: selfsigned-issuer
    secretName: media-pipeline-ingress-tls

valkey:
  enabled: true
  fullnameOverride: redis
  auth:
    enabled: false

postgres:
  replicas: 3
  username: app
  password: app
  size: 2Gi
  storageClass: ""

rabbitmq:
  username: app
  password: app
  size: 2Gi
  storageClass: ""
  replicas: 1

minio:
  enabled: true
  mode: standalone          # override the distributed/replicas:16 default
  replicas: 3
  fullnameOverride: minio   # Service stays "minio" → S3_ENDPOINT=minio:9000 keeps working
  rootUser: minioadmin
  rootPassword: minioadmin  # dev placeholder, >= 8 chars
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 256Mi         # override the 16Gi default
  buckets: []               # worker creates originals/processed itself
