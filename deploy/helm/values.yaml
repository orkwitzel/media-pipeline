# prod values
# Namespace is managed by Helm itself: install with
#   helm install media-pipeline ./deploy/helm -n media-pipeline --create-namespace
# Templates reference {{ .Release.Namespace }}, so the chart is namespace-agnostic.

web:
  replicas: 3

gateway:
  replicas: 3

worker:
  replicas: 3

notifier:
  replicas: 3

migrator:
  replicas: 1

ingress:
  origin: media-pipeline.example.com
  tls:
    enabled: false
    issuer: selfsigned-issuer
    secretName: media-pipeline-ingress-tls

valkey:
  enabled: true
  fullnameOverride: redis
  auth:
    enabled: false

postgres:
  replicas: 3
  username: app
  password: app
  size: 2Gi
  storageClass: ""

rabbitmq:
  username: app
  password: app
  size: 2Gi
  storageClass: ""
  replicas: 1