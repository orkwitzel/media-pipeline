apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: media-pipeline
  labels:
    app: notifier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notifier
  template:
    metadata:
      labels:
        app: notifier
    spec:
      containers:
        - name: notifier
          image: media-pipeline/notifier
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secrets
                  key: url
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 500m
              memory: 500Mi

---
apiVersion: v1
kind: Service
metadata:
  name: notifier
  namespace: media-pipeline
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: notifier
  type: ClusterIP