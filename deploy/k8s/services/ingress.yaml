# A: web (/) + notifier (/ws) — owns the host's TLS, NO rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-pipeline-web
  namespace: media-pipeline
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # long-lived /ws
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["media-pipeline.example.com"]
      secretName: media-pipeline-ingress-tls
  rules:
    - host: media-pipeline.example.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend: { service: { name: notifier, port: { number: 8082 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 8080 } } }
---
# B: gateway (/api) — WITH prefix strip
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-pipeline-api
  namespace: media-pipeline
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: media-pipeline.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: gateway, port: { number: 8080 } } }
---
# cert-manager self-signed issuer — cluster-scoped, NO namespace
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}