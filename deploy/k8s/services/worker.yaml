apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: media-pipeline
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: media-pipeline/worker
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secrets
                  key: url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secrets
                  key: url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: media-pipeline-config
                  key: REDIS_URL
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: media-pipeline-config
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: password
            - name: S3_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: media-pipeline-config
                  key: S3_USE_SSL
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: media-pipeline-config
                  key: S3_REGION
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 500m
              memory: 500Mi
