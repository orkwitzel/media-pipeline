# edge.nginx.conf — emulates the Kubernetes Ingress for local docker-compose.
#
# This is the routing contract from docs/contracts.md, made concrete:
#   /        -> web      (the SPA's static assets)
#   /api/... -> gateway  (the /api prefix is STRIPPED, e.g. /api/upload -> /upload)
#   /ws      -> notifier (WebSocket upgrade preserved)
#
# In real Kubernetes you reproduce this with an Ingress resource:
#   - path /        -> Service web      (port 8080)
#   - path /api(/|$)(.*) -> Service gateway (port 8080), with a rewrite that
#                           strips the /api prefix (e.g. nginx-ingress
#                           `rewrite-target: /$2`)
#   - path /ws      -> Service notifier (port 8082), with WebSocket enabled
#                      (nginx-ingress does this automatically; some controllers
#                       need an annotation).

server {
    listen 80;

    # Uploads can be up to gateway's MAX_UPLOAD_BYTES (10 MiB default). Without
    # this, nginx's 1 MiB default would reject larger images. In k8s this maps
    # to the ingress controller's proxy-body-size annotation.
    client_max_body_size 20m;

    # /api/<path>  ->  gateway /<path>   (trailing slash on proxy_pass strips /api/)
    location /api/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /ws  ->  notifier (WebSocket; path preserved, no trailing slash)
    location /ws {
        proxy_pass http://notifier:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
    }

    # everything else  ->  web (the SPA, with its own SPA fallback)
    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
