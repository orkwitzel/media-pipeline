# docker-compose.yml — LOCAL REFERENCE ONLY (not the Kubernetes deliverable).
#
# This file exists so you can run the whole pipeline on one machine and as a
# concrete, readable reference for the wiring you must reproduce in k8s:
#   - which env vars connect each service to RabbitMQ / Redis / Postgres / MinIO
#   - startup ordering (migrator runs to completion BEFORE the app services)
#   - health checks (the compose equivalents of your readiness/liveness probes)
#   - the `edge` service, which EMULATES your Ingress: it terminates :8080 and
#     routes  /  -> web,  /api -> gateway,  /ws -> notifier. Reproduce that
#     routing in your real Ingress resource.
#
# Quick start:
#   docker compose up --build        # then open http://localhost:8080
#   RabbitMQ UI:  http://localhost:15672  (app / app)
#   MinIO UI:     http://localhost:9001   (minioadmin / minioadmin)
#
# Scale the workers (the whole point of the exercise):
#   docker compose up -d --build --scale worker=4
#   ...then upload several images and watch the `process` queue drain in the
#   RabbitMQ UI as the 4 competing consumers share the load.
#
# Behind a TLS-intercepting proxy (e.g. corporate network), build the worker
# image with the opt-in escape hatch (default build stays secure):
#   UV_INSECURE_HOST="pypi.org files.pythonhosted.org" docker compose build worker

x-s3-env: &s3-env
  S3_ENDPOINT: minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_USE_SSL: "false"
  S3_REGION: us-east-1
  BUCKET_ORIGINALS: originals
  BUCKET_PROCESSED: processed

x-backends-env: &backends-env
  DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
  RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0

services:
  # ---------- backing services (you deploy these yourself in k8s) ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports: ["5432:5432"]            # exposed so you can `psql` for inspection
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5672:5672"                 # AMQP
      - "15672:15672"               # management UI — watch queues here
    volumes: ["rabbitmqdata:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"                 # S3 API
      - "9001:9001"                 # console UI
    volumes: ["miniodata:/data"]
    # No healthcheck: the minio image ships no curl/wget. The gateway and worker
    # both retry MinIO with backoff and create the buckets on startup, so they
    # tolerate MinIO not being ready yet — the same resilience you want in k8s.

  # ---------- run-to-completion init (your k8s Job / initContainer) ----------
  migrator:
    build: ./services/migrator
    environment:
      <<: *backends-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"                   # runs once, applies migrations, exits 0

  # ---------- application services ----------
  gateway:
    build: ./services/gateway
    environment:
      <<: [*backends-env, *s3-env]
      PORT: "8080"
      MAX_UPLOAD_BYTES: "10485760"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_started }
      migrator: { condition: service_completed_successfully }
    # No host port: reach it through `edge` at /api (mirrors Ingress).

  worker:
    build:
      context: ./services/worker
      args:
        # Empty by default (full TLS verification). Set UV_INSECURE_HOST in your
        # shell to skip TLS verification for those hosts on proxied networks.
        UV_INSECURE_HOST: ${UV_INSECURE_HOST:-}
    environment:
      <<: [*backends-env, *s3-env]
      HEALTH_PORT: "8081"
      PREFETCH: "1"
      THUMBNAIL_SIZE: "256"
      PROCESSED_MAX_SIZE: "1280"
      WATERMARK_TEXT: media-pipeline
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_started }
      migrator: { condition: service_completed_successfully }
    # Scale me: `docker compose up -d --scale worker=4` (competing consumers).

  notifier:
    build: ./services/notifier
    environment:
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
      PORT: "8082"
    depends_on:
      rabbitmq: { condition: service_healthy }
    # No host port: reach its WebSocket through `edge` at /ws.

  web:
    build: ./services/web
    # Static SPA on :8080 (non-root nginx). Served to the browser via `edge`.
    depends_on: [gateway, notifier]

  # ---------- ingress emulation (your k8s Ingress lives here in real life) ----
  edge:
    image: nginx:1.27-alpine
    ports: ["8080:80"]              # <- open http://localhost:8080
    volumes:
      - ./deploy/edge.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web, gateway, notifier]

volumes:
  pgdata:
  rabbitmqdata:
  miniodata:
